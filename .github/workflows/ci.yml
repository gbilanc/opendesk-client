name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  # ── Lint & Type check ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python pin 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check formatting with Black
        run: uv run black --check --diff opendesk/ tests/

      - name: Lint with Ruff
        run: uv run ruff check opendesk/ tests/

      - name: Type check with mypy
        run: uv run mypy opendesk/ --ignore-missing-imports

  # ── Test ───────────────────────────────────────────────────────────
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python pin 3.12

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxtst-dev

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short



